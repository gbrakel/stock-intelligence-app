name: Daily Stock Intelligence Pipeline

on:
  schedule:
    # Run at 6:30 PM ET (23:30 UTC) on weekdays (Mon-Fri)
    - cron: '30 23 * * 1-5'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Cache FinBERT model
        uses: actions/cache@v4
        with:
          path: pipeline/.model_cache
          key: finbert-model-v1

      - name: Run pipeline
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TRANSFORMERS_CACHE: pipeline/.model_cache
        run: python -m pipeline.main
        working-directory: .

      - name: Commit and push data
        run: |
          git config user.name "Stock Intel Bot"
          git config user.email "bot@stock-intel.local"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Daily data update $(date -u +%Y-%m-%d)"
            git push
          fi

  build-frontend:
    needs: run-pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # Get the latest commit (including data update)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build static site
        run: npm run build
        working-directory: frontend

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
